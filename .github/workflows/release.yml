# Disparado por tag v* (ex.: release-patch.bat).
# O electron-updater usa latest.yml + .exe + .blockmap em dist-electron-build.
# O nome do .exe DEVE ser o de package.json build.win.artifactName (ex.: Pulso-Setup-x.y.z.exe);
# se latest.yml apontar para outro ficheiro, o download no cliente devolve 404.
# NAO substituir só pelo instalador do subprojeto installer (sem latest.yml alinhado).
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:electron

      - run: cd installer && npm ci && npm run installer:build

      - name: Listar artefatos (debug)
        shell: pwsh
        run: |
          Write-Host "=== dist-electron-build (feed auto-update Pulso) ==="
          Get-ChildItem -Path dist-electron-build -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== installer/dist-installer ==="
          Get-ChildItem -Path installer/dist-installer -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            dist-electron-build/latest.yml
            dist-electron-build/*.exe
            dist-electron-build/*.blockmap
            installer/dist-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
